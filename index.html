<!doctype html>
<html lang="hr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nail Room by Anita — Uskoro</title>
    <meta
      name="description"
      content="Nail Room by Anita — nail studio u Splitu. Nova web stranica uskoro dolazi."
    />
    <meta property="og:title" content="Nail Room by Anita" />
    <meta
      property="og:description"
      content="Preciznost, njega i estetika — u srcu Splita. Stranica uskoro dolazi."
    />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#f9f8f6" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        -webkit-tap-highlight-color: transparent;
      }

      :root {
        --bg: #f9f8f6;
        --surface: #ffffff;
        --gold: #c9a96e;
        --gold-pale: #f7efe0;
        --gold-dark: #a8823f;
        --text: #1c1c1a;
        --text-2: #6b6360;
        --text-3: #a8a4a0;
        --border: rgba(201, 169, 110, 0.16);
        --r-pill: 100px;
        --r-md: 18px;
        --shadow-sm:
          0 2px 18px rgba(180, 140, 70, 0.09), 0 1px 3px rgba(0, 0, 0, 0.04);
        --shadow-md:
          0 8px 40px rgba(180, 140, 70, 0.13), 0 2px 8px rgba(0, 0, 0, 0.05);
        --bar-h: 52px;
        --bar-top: 16px;
      }

      body {
        font-family: 'Inter', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100svh;
        overflow-x: hidden;
      }

      /* ── Top bar ─────────────────────────────────────────── */
      .top-bar {
        position: fixed;
        top: var(--bar-top);
        left: 16px;
        right: 16px;
        height: var(--bar-h);
        background: rgba(249, 248, 246, 0.92);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-radius: var(--r-pill);
        border: 1px solid var(--border);
        box-shadow: var(--shadow-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 22px;
        z-index: 10;
      }

      .top-bar-brand {
        font-family: 'Cormorant Garamond', serif;
        font-size: 16px;
        font-weight: 400;
        font-style: italic;
        color: var(--text);
        letter-spacing: 0.3px;
        user-select: none;
      }

      /* ── Hero ────────────────────────────────────────────── */
      .hero {
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: calc(var(--bar-top) + var(--bar-h) + 32px) 28px 48px;
        position: relative;
        overflow: hidden;
      }

      .hero::before {
        content: '';
        position: absolute;
        top: -100px;
        right: -80px;
        width: 460px;
        height: 460px;
        background: radial-gradient(
          circle,
          rgba(201, 169, 110, 0.12) 0%,
          transparent 60%
        );
        border-radius: 50%;
        pointer-events: none;
      }

      .hero::after {
        content: '';
        position: absolute;
        bottom: 80px;
        left: -70px;
        width: 320px;
        height: 320px;
        background: radial-gradient(
          circle,
          rgba(201, 169, 110, 0.08) 0%,
          transparent 60%
        );
        border-radius: 50%;
        pointer-events: none;
      }

      .hero-inner {
        position: relative;
        z-index: 1;
        max-width: 420px;
        width: 100%;
      }

      .home-tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 18px;
        border-radius: var(--r-pill);
        background: rgba(255, 255, 255, 0.85);
        border: 1px solid var(--border);
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-2);
        box-shadow: var(--shadow-sm);
        margin-bottom: 30px;
        opacity: 0;
        animation: fadeUp 0.6s ease 0.15s forwards;
        backdrop-filter: blur(8px);
      }

      .home-tag .dot-gold {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--gold);
        box-shadow: 0 0 6px rgba(201, 169, 110, 0.5);
        animation: pipBounce 2s ease-in-out infinite;
      }

      .home-title {
        font-family: 'Cormorant Garamond', serif;
        font-size: clamp(50px, 14vw, 80px);
        font-weight: 300;
        line-height: 1;
        color: var(--text);
        letter-spacing: -1px;
        opacity: 0;
        animation: fadeUp 0.8s ease 0.35s forwards;
      }

      .home-title .italic {
        font-style: italic;
        font-weight: 400;
        color: var(--gold);
      }

      .home-by {
        display: block;
        font-family: 'Cormorant Garamond', serif;
        font-size: clamp(19px, 5.5vw, 28px);
        font-weight: 300;
        font-style: italic;
        color: var(--text-2);
        margin-top: 6px;
      }

      .home-line {
        width: 0;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--gold),
          transparent
        );
        margin: 28px auto;
        opacity: 0;
        animation: expandLine 0.8s ease 0.75s forwards;
      }

      .home-sub {
        font-size: 14px;
        font-weight: 300;
        color: var(--text-2);
        letter-spacing: 0.3px;
        line-height: 1.7;
        opacity: 0;
        animation: fadeUp 0.6s ease 0.95s forwards;
        margin-bottom: 32px;
      }

      .info-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-md);
        box-shadow: var(--shadow-sm);
        padding: 22px 24px;
        text-align: left;
        opacity: 0;
        animation: fadeUp 0.6s ease 1.15s forwards;
        margin-bottom: 28px;
      }

      .info-card-label {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-3);
        margin-bottom: 16px;
      }

      .info-row {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        padding: 12px 0;
        border-bottom: 1px solid var(--border);
      }

      .info-row:last-child {
        border-bottom: none;
        padding-bottom: 0;
      }

      .info-row:first-of-type {
        padding-top: 0;
      }

      .info-ico {
        flex-shrink: 0;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--gold-pale);
        border: 1px solid rgba(201, 169, 110, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .info-ico svg {
        width: 16px;
        height: 16px;
        stroke: var(--gold-dark);
        stroke-width: 1.8;
      }

      .info-lbl {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        color: var(--text-3);
        margin-bottom: 3px;
      }

      .info-val {
        font-size: 13px;
        font-weight: 400;
        color: var(--text);
        line-height: 1.55;
      }

      .home-btns {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        opacity: 0;
        animation: fadeUp 0.6s ease 1.35s forwards;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 14px 32px;
        border-radius: var(--r-pill);
        border: none;
        font-family: inherit;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.3s ease;
        width: 100%;
        max-width: 280px;
      }

      .btn-outline {
        background: transparent;
        color: var(--text);
        border: 1.5px solid var(--border);
      }

      .btn-outline:hover,
      .btn-outline:active {
        border-color: var(--text-2);
        background: var(--surface);
        box-shadow: var(--shadow-sm);
        transform: translateY(-1px);
      }

      .btn svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }

      .page-footer {
        position: relative;
        z-index: 1;
        margin-top: 40px;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        color: var(--text-3);
        opacity: 0;
        animation: fadeIn 0.6s ease 1.55s forwards;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes expandLine {
        from {
          width: 0;
          opacity: 0;
        }
        to {
          width: 56px;
          opacity: 1;
        }
      }

      @keyframes pipBounce {
        0%,
        100% {
          transform: translateY(0);
          opacity: 1;
        }
        50% {
          transform: translateY(-4px);
          opacity: 0.5;
        }
      }

      @media (min-width: 600px) {
        .top-bar {
          left: 50%;
          right: auto;
          transform: translateX(-50%);
          width: min(420px, calc(100% - 32px));
        }
      }
    </style>
  </head>
  <body>
    <header class="top-bar">
      <div class="top-bar-brand">Nail Room by Anita</div>
    </header>

    <main class="hero">
      <div class="hero-inner">
        <div class="home-tag">
          <span class="dot-gold"></span>
          Uskoro
        </div>

        <h1 class="home-title">
          Nail<br />Room
          <span class="home-by">by <span class="italic">Anita</span></span>
        </h1>

        <div class="home-line"></div>

        <p class="home-sub">Web stranica je u pripremi.<br /></p>

        <div class="home-btns">
          <!-- Zamijeni href s pravim Instagram linkom -->
          <a
            class="btn btn-outline"
            href="https://www.instagram.com/nail_room_by_anita/"
            target="_blank"
            rel="noopener noreferrer"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5" />
              <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" />
              <line x1="17.5" y1="6.5" x2="17.51" y2="6.5" />
            </svg>
            Pratite nas
          </a>
        </div>

        <footer class="page-footer">
          Nail Room by Anita &copy; <span id="year"></span>
        </footer>
      </div>
    </main>

    <script>
      document.getElementById('year').textContent = new Date().getFullYear();
    </script>
  </body>
</html>
